<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Ticket</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <main>
        <section id="nav-inicio" style="margin-bottom: 15px;">
            <div id="btn_inicio" style="cursor: pointer; display: inline-flex; align-items: center; gap: 8px; color: #0056b3; font-weight: bold;" title="Voltar ao Início / Novo Ticket">
                <span style="font-size: 1.5rem;">🏠</span>
                <span>Início / Novo Ticket</span>
            </div>
        </section>

        <section>
            <h1>Gestão de Tickets</h1>
            <form id="formTicket">
                <div class="grid-item full-width">
                    <label for="ticket_em_consulta" style="color: #0056b3;">Ticket sob Consulta:</label>
                    <input type="text" id="ticket_em_consulta" name="ticket_em_consulta" readonly placeholder="Nenhum ticket selecionado" style="background-color: #e9ecef; font-weight: bold;">
                </div>

                <div class="grid-item">
                    <label class="titulo-campo">Tipo do Ticket:</label>
                    <div class="radio-group">
                        <input type="radio" id="req" name="ticket" value="Requisição (SLA: 16h)">
                        <label for="req">Requisição (SLA: 16h)</label>
                        <input type="radio" id="inc" name="ticket" value="Incidente (SLA: 4h)">
                        <label for="inc">Incidente (SLA: 4h)</label>
                    </div>
                </div>

                <div class="grid-item">
                    <label class="titulo-campo">Nível do Suporte:</label>
                    <div class="radio-group">
                        <input type="radio" id="n1" name="nivel_suporte" value="N1">
                        <label for="n1">N1</label>
                        <input type="radio" id="n2" name="nivel_suporte" value="N2">
                        <label for="n2">N2</label>
                        <input type="radio" id="n3" name="nivel_suporte" value="N3">
                        <label for="n3">N3</label>
                    </div>
                </div>

                <div class="grid-item full-width">
                    <label class="titulo-campo">Definir Categoria:</label>
                    <div class="radio-group">
                        <input type="radio" id="catX" name="categoria" value="Usuário(Hardware/Sistema)">
                        <label for="catX">Usuário(Hardware/Sistema)</label>
                        <input type="radio" id="catY" name="categoria" value="Administrativo(Hardware/Sistema)">
                        <label for="catY">Administrativo(Hardware/Sistema)</label>
                        <input type="radio" id="catZ" name="categoria" value="Outro">
                        <label for="catZ">Outro</label>
                    </div>
                    <div style="margin-top: 10px;">
                        <label for="outra_categoria" style="font-size: 0.8rem; color: #666;">Especificar Categoria:</label>
                        <input type="text" id="outra_categoria" disabled name="outra_categoria">
                    </div>
                </div>
                
                <div class="grid-item full-width">
                    <label for="nome_contato">Nome do Contato:</label>
                    <input type="text" id="nome_contato" name="nome_contato">
                </div>

                <div class="grid-item">
                    <label for="email_contato">Email para Contato:</label>
                    <input type="email" id="email_contato" name="email_contato">
                </div>

                <div class="grid-item">
                    <label for="telefone_contato">Telefone para Contato:</label>
                    <input type="text" id="telefone_contato" name="telefone_contato">
                </div>

                <div class="grid-item full-width">
                    <label for="descricao_problema">Descrição do Problema:</label>
                    <textarea id="descricao_problema" name="descricao" rows="4"></textarea>
                    
                    <div id="area_atualizacao" style="margin-top: 15px;">
                        <div class="checkbox-container">
                            <input type="checkbox" id="check_atualizacao">
                            <label for="check_atualizacao">Adicionar Atualizações no Ticket:</label>
                        </div>
                        <textarea id="txt_atualizacao" name="atualizacoes" rows="4" style="display: none; margin-top: 10px;" placeholder="Digite as novas informações do ticket..."></textarea>
                    </div>
                </div>

                <div class="grid-item full-width">
                    <div class="checkbox-container">
                        <input type="checkbox" id="check_resolucao">
                        <label for="check_resolucao">Habilitar preenchimento da resolução</label>
                    </div>
                    <label for="descricao_resolução">Descrição da Resolução:</label>
                    <textarea id="descricao_resolução" name="descricao_resolucao" rows="4" disabled></textarea>
                </div>

                <div class="grid-item full-width">
                    <label for="lista">Selecionar Ticket Existente:</label>
                    <select id="lista" name="lista"></select>
                </div>

                <div class="button-group full-width">
                    <button type="submit" id="criar_ticket" class="btn-principal">Criar Ticket</button>
                    <div class="acoes-secundarias">
                        <button type="submit" id="consultar_ticket">Consultar</button>
                        <button type="submit" id="atualizar_ticket">Atualizar</button>
                        <button type="submit" id="encerrar_ticket">Encerrar</button>
                        <button type="submit" id="relatorio_ticket">Relatórios</button>
                    </div>
                </div>

                <div id="secao_relatorio" class="grid-item full-width" style="display: none; margin-top: 20px; padding: 20px; border: 1px solid #0056b3; border-radius: 8px; background: #f8f9fa;">
                    <h3 style="color: #0056b3; margin-bottom: 12px; font-size: 1.1rem;">Filtros do Relatório</h3>
                    
                    <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px;">
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_req" value="Requisição (SLA: 16h)"><label for="rel_req">Req. (16h)</label></div>
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_inc" value="Incidente (SLA: 4h)"><label for="rel_inc">Inc. (4h)</label></div>
                        
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_n1" value="N1"><label for="rel_n1">N1</label></div>
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_n2" value="N2"><label for="rel_n2">N2</label></div>
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_n3" value="N3"><label for="rel_n3">N3</label></div>
                        
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_catX" value="Usuário(Hardware/Sistema)"><label for="rel_catX">Cat. Usuário</label></div>
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_catY" value="Administrativo(Hardware/Sistema)"><label for="rel_catY">Cat. Admin</label></div>
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_catZ" value="Outro"><label for="rel_catZ">Cat. Outro</label></div>
                        
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_status_aberto" value="Aberto/Em Progresso"><label for="rel_status_aberto">Status: Aberto</label></div>
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_status_encerrado" value="Encerrado"><label for="rel_status_encerrado">Status: Encerrado</label></div>
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_status_vencido" value="Vencido"><label for="rel_status_vencido">Status: Vencido</label></div>
                        
                        <div class="checkbox-container"><input type="radio" name="filtro_relatorio" id="rel_com_atualizacao" value="com_atualizacao"><label for="rel_com_atualizacao">Com Atualizações</label></div>
                    </div>
                    
                    <button type="button" id="btn_limpar_filtros" style="background-color: #6c757d; color: white; padding: 6px 12px; font-size: 0.85rem; margin-bottom: 15px; align-self: flex-start; border-radius: 4px;">Limpar Filtros</button>

                    <label for="txt_resultado_relatorio" style="font-weight: bold; margin-bottom: 5px;">Resultado Gerado:</label>
                    <textarea id="txt_resultado_relatorio" rows="12" readonly style="background-color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; line-height: 1.4; white-space: pre;" placeholder="Os dados do relatório aparecerão aqui dinamicamente ao selecionar os filtros..."></textarea>
                </div>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
