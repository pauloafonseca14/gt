<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Ticket</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <main>
        <section id="nav-inicio" style="margin-bottom: 15px;">
            <div id="btn_inicio" style="cursor: pointer; display: inline-flex; align-items: center; gap: 8px; color: #0056b3; font-weight: bold;" title="Voltar ao Início / Novo Ticket">
                <span style="font-size: 1.5rem;">🏠</span>
                <span>Início / Novo Ticket</span>
            </div>
        </section>

        <section>
            <h1>Gestão de Tickets</h1>
            <form id="formTicket">
                <div class="grid-item">
                    <label class="titulo-campo">Tipo do Ticket:</label>
                    <div class="radio-group">
                        <input type="radio" id="req" name="ticket" value="Requisição (SLA: 16h)">
                        <label for="req">Requisição (SLA: 16h)</label>
                        <input type="radio" id="inc" name="ticket" value="Incidente (SLA: 4h)">
                        <label for="inc">Incidente (SLA: 4h)</label>
                    </div>
                </div>

                <div class="grid-item">
                    <label class="titulo-campo">Nível do Suporte:</label>
                    <div class="radio-group">
                        <input type="radio" id="n1" name="nivel_suporte" value="N1">
                        <label for="n1">N1</label>
                        <input type="radio" id="n2" name="nivel_suporte" value="N2">
                        <label for="n2">N2</label>
                        <input type="radio" id="n3" name="nivel_suporte" value="N3">
                        <label for="n3">N3</label>
                    </div>
                </div>

                <div class="grid-item full-width">
                    <label class="titulo-campo">Definir Categoria:</label>
                    <div class="radio-group">
                        <input type="radio" id="catX" name="categoria" value="Usuário(Hardware/Sistema)">
                        <label for="catX">Usuário(Hardware/Sistema)</label>
                        <input type="radio" id="catY" name="categoria" value="Administrativo(Hardware/Sistema)">
                        <label for="catY">Administrativo(Hardware/Sistema)</label>
                        <input type="radio" id="catZ" name="categoria" value="Outro">
                        <label for="catZ">Outro</label>
                    </div>
                    <div style="margin-top: 10px;">
                        <label for="outra_categoria" style="font-size: 0.8rem; color: #666;">Especificar Categoria:</label>
                        <input type="text" id="outra_categoria" disabled name="outra_categoria">
                    </div>
                </div>
                
                <div class="grid-item full-width">
                    <label for="nome_contato">Nome do Contato:</label>
                    <input type="text" id="nome_contato" name="nome_contato">
                </div>

                <div class="grid-item">
                    <label for="email_contato">Email para Contato:</label>
                    <input type="email" id="email_contato" name="email_contato">
                </div>

                <div class="grid-item">
                    <label for="telefone_contato">Telefone para Contato:</label>
                    <input type="text" id="telefone_contato" name="telefone_contato">
                </div>

                <div class="grid-item full-width">
                    <label for="descricao_problema">Descrição do Problema:</label>
                    <textarea id="descricao_problema" name="descricao" rows="4"></textarea>
                    
                    <div id="area_atualizacao" style="margin-top: 15px;">
                        <div class="checkbox-container">
                            <input type="checkbox" id="check_atualizacao">
                            <label for="check_atualizacao" style="font-weight: bold; color: #0056b3;">Adicionar Atualizações no Ticket:</label>
                        </div>
                        <textarea id="txt_atualizacao" name="atualizacoes" rows="4" style="display: none; margin-top: 10px;" placeholder="Digite as novas informações do ticket..."></textarea>
                    </div>
                </div>

                <div class="grid-item full-width">
                    <div class="checkbox-container">
                        <input type="checkbox" id="check_resolucao">
                        <label for="check_resolucao">Habilitar preenchimento da resolução</label>
                    </div>
                    <label for="descricao_resolução">Descrição da Resolução:</label>
                    <textarea id="descricao_resolução" name="descricao_resolucao" rows="4" disabled></textarea>
                </div>

                <div class="grid-item full-width">
                    <label for="lista">Selecionar Ticket Existente:</label>
                    <select id="lista" name="lista"></select>
                </div>

                <div class="button-group full-width">
                    <button type="submit" id="criar_ticket" class="btn-principal">Criar Ticket</button>
                    <div class="acoes-secundarias">
                        <button type="submit" id="consultar_ticket">Consultar</button>
                        <button type="submit" id="atualizar_ticket">Atualizar</button>
                        <button type="submit" id="excluir_ticket">Excluir</button>
                        <button type="submit" id="encerrar_ticket">Encerrar</button>
                    </div>
                </div>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
